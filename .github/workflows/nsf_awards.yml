# .github/workflows/nsf_awards.yml
# Extracts grants from the NSF Awards API using the published Docker image.
name: NSF Awards Extraction

on:
  schedule:
    - cron: "45 6 * * *"
  workflow_dispatch:
    inputs:
      date_from:
        description: "Start date (YYYY-MM-DD). Default: 2025-03-01"
        required: false
        default: "2025-03-01"
      date_to:
        description: "End date (YYYY-MM-DD). Default: 2025-03-15"
        required: false
        default: "2025-03-15"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Create output directories
        run: mkdir -p output logs

      - name: Run NSF Awards extraction
        run: |
          FROM="${{ github.event.inputs.date_from || '2025-03-01' }}"
          TO="${{ github.event.inputs.date_to || '2025-03-15' }}"
          docker run --rm \
            -v ${{ github.workspace }}/output:/app/output \
            -v ${{ github.workspace }}/logs:/app/logs \
            ghcr.io/poornimaramakrishnan/grant-extract:latest \
            python -m grant_extract.scripts.nsf_awards \
              --date-from "$FROM" --date-to "$TO"

      - name: Upload .xlsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsf-awards-grants
          path: output/*.xlsx
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nsf-awards-logs
          path: logs/*.log
          retention-days: 7
