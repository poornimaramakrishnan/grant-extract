# .github/workflows/cordis_eu.yml
# Extracts grants from the EU CORDIS API using the published Docker image.
name: CORDIS EU Extraction

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      date_from:
        description: "Start date (YYYY-MM-DD). Default: 2024-01-01"
        required: false
        default: "2024-01-01"
      date_to:
        description: "End date (YYYY-MM-DD). Default: 2024-03-31"
        required: false
        default: "2024-03-31"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Create output directories
        run: mkdir -p output logs

      - name: Run CORDIS EU extraction
        run: |
          FROM="${{ github.event.inputs.date_from || '2024-01-01' }}"
          TO="${{ github.event.inputs.date_to || '2024-03-31' }}"
          docker run --rm \
            -v ${{ github.workspace }}/output:/app/output \
            -v ${{ github.workspace }}/logs:/app/logs \
            ghcr.io/poornimaramakrishnan/grant-extract:latest \
            python -m grant_extract.scripts.cordis_eu \
              --date-from "$FROM" --date-to "$TO"

      - name: Upload .xlsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: cordis-eu-grants
          path: output/*.xlsx
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cordis-eu-logs
          path: logs/*.log
          retention-days: 7
