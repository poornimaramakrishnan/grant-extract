# .github/workflows/cordis_eu.yml
# Extracts grants from the EU CORDIS API using the published Docker image.
name: CORDIS EU Extraction

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to extract (YYYY-MM-DD). Leave empty for yesterday."
        required: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Create output directories
        run: mkdir -p output logs

      - name: Run CORDIS EU extraction
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          docker run --rm \
            -v ${{ github.workspace }}/output:/app/output \
            -v ${{ github.workspace }}/logs:/app/logs \
            ghcr.io/poornimaramakrishnan/grant-extract:latest \
            python -m grant_extract.scripts.cordis_eu $DATE_ARG

      - name: Upload .xlsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: cordis-eu-grants
          path: output/*.xlsx
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cordis-eu-logs
          path: logs/*.log
          retention-days: 7
