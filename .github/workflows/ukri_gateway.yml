# .github/workflows/ukri_gateway.yml
# Extracts grants from the UKRI Gateway to Research API using the published Docker image.
name: UKRI Gateway Extraction

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:
    inputs:
      date_from:
        description: "Start date (YYYY-MM-DD). Default: 2024-06-01"
        required: false
        default: "2024-06-01"
      date_to:
        description: "End date (YYYY-MM-DD). Default: 2024-09-30"
        required: false
        default: "2024-09-30"
      max_pages:
        description: "Max project pages to scan (default: 30)"
        required: false
        default: "30"
      skip_pi:
        description: "Skip PI name lookups for faster bulk runs (true/false)"
        required: false
        default: "false"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Create output directories
        run: mkdir -p output logs

      - name: Run UKRI Gateway extraction
        run: |
          FROM="${{ github.event.inputs.date_from || '2024-06-01' }}"
          TO="${{ github.event.inputs.date_to || '2024-09-30' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '30' }}"
          SKIP_PI="${{ github.event.inputs.skip_pi || 'false' }}"
          docker run --rm \
            -e UKRI_MAX_PAGES="$MAX_PAGES" \
            -e UKRI_SKIP_PI="$SKIP_PI" \
            -e UKRI_THROTTLE="0.3" \
            -v ${{ github.workspace }}/output:/app/output \
            -v ${{ github.workspace }}/logs:/app/logs \
            ghcr.io/poornimaramakrishnan/grant-extract:latest \
            python -m grant_extract.scripts.ukri_gateway \
              --date-from "$FROM" --date-to "$TO"

      - name: Upload .xlsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: ukri-gateway-grants
          path: output/*.xlsx
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ukri-gateway-logs
          path: logs/*.log
          retention-days: 7
